<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a1e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Deck — abstract minimalist trading card game">
  <link rel="manifest" href="manifest.json">
  <title>Deck</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root {
      width: 100%; min-height: 100vh; background: #1a1a1e; color: #e8e6df;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased; overflow-x: hidden;
    }
    body { background: #1a1a1e; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(127,119,221,.3); border-radius: 2px; }
    @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    input, button, select, textarea { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React 18 -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>

  <!-- Firebase 10 (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <!-- Require shim -->
  <script>
    window.require = function(mod) {
      if (mod === "react") return window.React;
      if (mod === "react-dom") return window.ReactDOM;
      if (mod === "react-dom/client") return window.ReactDOM;
      throw new Error("Cannot require: " + mod);
    };
  </script>

  <script src="game.js"></script>

  <script>
    const root = ReactDOM.createRoot(document.getElementById("root"));
    const App = CardGameModule.default || CardGameModule.CardGame || CardGameModule;
    root.render(React.createElement(App));
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    }
  </script>
</body>
</html>
